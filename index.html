<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Мяу-Корпорация — Доставка</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;800;900&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
    --vktop:calc(env(safe-area-inset-top,0px) + 50px); /* буфер под кнопки ВК «Поверх окна» */
    --glass:rgba(18,20,30,.52); --glass-2:rgba(16,18,26,.72);
    --stroke:1px solid rgba(255,255,255,.12);
    --hl:inset 0 1px 0 rgba(255,255,255,.16);
    --shadow:0 10px 26px rgba(0,0,0,.38);
    --accent:linear-gradient(135deg,#5EEAD4,#7C7CF0);
    --ink:#f4f6fb; --ink-dim:rgba(244,246,251,.62);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; }
  html,body{ height:100%; overflow:hidden; background:#0b0d12; color:var(--ink);
    font-family:Manrope,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  body{ display:flex; align-items:center; justify-content:center; }
  #backdrop{ position:fixed; inset:0; z-index:0; overflow:hidden; background:#0b0d12; }
  #backdrop img{ position:absolute; inset:-8%; width:116%; height:116%; object-fit:cover; filter:blur(30px) brightness(.4) saturate(1.1); }
  #stage{ position:relative; z-index:1; overflow:hidden; height:100vh; height:100dvh; width:100vw; width:min(100vw, 56.25dvh); box-shadow:0 0 60px rgba(0,0,0,.6); }
  #scene{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; filter:brightness(.78) saturate(1.05); }
  #stage:before{ content:''; position:absolute; left:0; right:0; top:0; height:34%; z-index:1; pointer-events:none; background:linear-gradient(to bottom, rgba(8,9,14,.78), rgba(8,9,14,0)); }
  #stage:after{ content:''; position:absolute; left:0; right:0; bottom:0; height:56%; z-index:1; pointer-events:none; background:linear-gradient(to top, rgba(8,9,14,.94), rgba(8,9,14,0)); }
  .glass{ background:var(--glass); border:var(--stroke); box-shadow:var(--shadow), var(--hl); border-radius:20px; }

  .hud{ position:absolute; z-index:5; top:calc(8px + var(--vktop)); left:12px; right:12px; display:flex; gap:8px; align-items:center; }
  .pill{ background:var(--glass); border:var(--stroke); box-shadow:var(--hl); border-radius:999px; padding:9px 14px; display:flex; align-items:center; gap:7px; font-weight:800; }
  .pill .lbl{ font-size:11px; font-weight:700; color:var(--ink-dim); }
  #coins{ font-size:18px; font-family:Unbounded; letter-spacing:.3px; }
  #rate{ font-size:15px; }
  .hud .sp{ flex:1; }
  .icobtn{ width:42px; height:42px; border-radius:14px; background:var(--glass); border:var(--stroke); box-shadow:var(--hl); display:flex; align-items:center; justify-content:center; font-size:19px; cursor:pointer; }

  .biz{ position:absolute; z-index:5; top:calc(58px + var(--vktop)); left:12px; right:12px; display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; }
  .biz::-webkit-scrollbar{ display:none; }
  .bizchip{ flex:0 0 auto; padding:8px 14px; border-radius:14px; background:var(--glass); border:var(--stroke); box-shadow:var(--hl); font-weight:800; font-size:13px; display:flex; align-items:center; gap:6px; color:var(--ink-dim); }
  .bizchip.on{ color:#0b0d12; background:var(--accent); border-color:transparent; box-shadow:0 6px 16px rgba(110,120,240,.4); }
  .bizchip .lock{ opacity:.7; font-size:12px; }

  .bizTitle{ position:absolute; z-index:4; left:0; right:0; top:calc(104px + var(--vktop)); text-align:center; pointer-events:none; }
  .bizTitle h1{ font-family:Unbounded; font-weight:900; font-size:22px; letter-spacing:.4px; }
  .bizTitle p{ font-size:12px; color:var(--ink-dim); font-weight:700; margin-top:2px; }

  #boardWrap{ position:absolute; z-index:4; left:12px; right:12px; top:calc(170px + var(--vktop)); bottom:calc(136px + var(--safe-bot));
    display:flex; align-items:center; justify-content:center; }
  #boardPanel{ width:100%; max-height:100%; border-radius:24px; border:var(--stroke);
    background:linear-gradient(180deg, rgba(23,26,38,.93), rgba(12,14,20,.97));
    box-shadow:0 18px 44px rgba(0,0,0,.55), var(--hl); }
  #board{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:14px; touch-action:none; }
  .cell{ position:relative; aspect-ratio:1; border-radius:14px; background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.09); box-shadow:inset 0 1px 0 rgba(255,255,255,.05); overflow:hidden; }
  .cell.filled{ border:1px solid rgba(255,255,255,.16); background:#0b0d12; cursor:grab; box-shadow:var(--hl); }
  .cell img{ width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
  .cell .rk{ position:absolute; left:5px; bottom:5px; background:rgba(8,9,14,.7); border:var(--stroke); border-radius:8px; font-size:10px; font-weight:900; padding:1px 6px; }
  .cell.dragging{ opacity:.22; }
  .cell.mergeable{ outline:2px solid #7EEAD4; outline-offset:-2px; box-shadow:0 0 0 4px rgba(126,234,212,.28), var(--hl); }
  .cell.pop{ animation:pop .3s cubic-bezier(.2,1.5,.4,1); }
  @keyframes pop{ 0%{ transform:scale(.5);} 60%{ transform:scale(1.12);} 100%{ transform:scale(1);} }

  /* ghost при перетаскивании — «увеличалка» */
  #ghost{ position:fixed; z-index:30; pointer-events:none; border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,.28);
    box-shadow:0 22px 48px rgba(0,0,0,.6); transform:translate(-50%,-50%) scale(1) rotate(0deg);
    transition:transform .16s cubic-bezier(.2,1.7,.4,1), left .13s ease-out, top .13s ease-out; }
  #ghost.lift{ transform:translate(-50%,-60%) scale(1.3) rotate(-3deg); }
  #ghost img{ width:100%; height:100%; object-fit:cover; display:block; }
  #ghost .rk{ position:absolute; left:6px; bottom:6px; background:rgba(8,9,14,.7); border:var(--stroke); border-radius:8px; font-size:11px; font-weight:900; padding:1px 6px; }

  /* бегущая строка-шутки */
  #ticker{ position:absolute; z-index:5; left:12px; right:12px; bottom:calc(92px + var(--safe-bot)); height:32px;
    display:flex; align-items:center; gap:9px; padding:0 13px; overflow:hidden; background:var(--glass); border:var(--stroke); box-shadow:var(--hl); border-radius:14px; }
  #ticker .ic{ flex:0 0 auto; font-size:15px; filter:drop-shadow(0 1px 2px rgba(0,0,0,.4)); }
  #ticker .win{ flex:1; overflow:hidden; height:100%; position:relative; -webkit-mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent); mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent); }
  #ticker .run{ position:absolute; top:50%; transform:translateY(-50%); white-space:nowrap; padding-left:100%; font-weight:700; font-size:12.5px; color:var(--ink); animation:tick 22s linear infinite; }
  @keyframes tick{ 0%{ transform:translate(0,-50%);} 100%{ transform:translate(-100%,-50%);} }

  .dock{ position:absolute; z-index:6; left:12px; right:12px; bottom:calc(14px + var(--safe-bot)); display:flex; gap:10px; align-items:stretch; }
  #hireBtn{ flex:1; border:none; border-radius:20px; padding:15px; font-family:Unbounded; font-weight:800; font-size:16px; color:#08120f; background:var(--accent); box-shadow:0 8px 22px rgba(94,234,212,.32), var(--hl); cursor:pointer; transition:transform .08s; display:flex; flex-direction:column; align-items:center; gap:1px; }
  #hireBtn:active{ transform:translateY(2px) scale(.99); }
  #hireBtn small{ font-family:Manrope; font-weight:700; font-size:12px; opacity:.8; }
  #hireBtn:disabled{ filter:grayscale(.5) brightness(.85); }
  .dbtn{ width:60px; border-radius:20px; background:var(--glass); border:var(--stroke); box-shadow:var(--hl); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:20px; cursor:pointer; position:relative; }
  .dbtn small{ font-size:9px; font-weight:800; color:var(--ink-dim); }
  .badge{ position:absolute; top:-5px; right:-5px; background:var(--accent); color:#08120f; font-size:10px; font-weight:900; border-radius:9px; padding:1px 6px; }

  #reveal{ position:absolute; inset:0; z-index:9; display:none; align-items:center; justify-content:center; background:rgba(8,9,14,.55); backdrop-filter:blur(14px) saturate(1.2); -webkit-backdrop-filter:blur(14px) saturate(1.2); }
  #reveal.show{ display:flex; animation:fade .25s; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  .mcard{ width:82%; max-width:330px; border-radius:26px; overflow:hidden; background:var(--glass-2); border:var(--stroke); box-shadow:0 24px 60px rgba(0,0,0,.6), var(--hl); transform:translateY(10px) scale(.96); animation:rise .34s cubic-bezier(.2,1.3,.4,1) forwards; }
  @keyframes rise{ to{ transform:translateY(0) scale(1);} }
  .mcard .ph{ position:relative; aspect-ratio:4/5; }
  .mcard .ph img{ width:100%; height:100%; object-fit:cover; }
  .mcard .ph:after{ content:''; position:absolute; inset:0; background:linear-gradient(to top, rgba(8,9,14,.9), rgba(8,9,14,0) 45%); }
  .mcard .cap{ position:absolute; left:16px; right:16px; bottom:14px; }
  .mcard .new{ display:inline-block; background:var(--accent); color:#08120f; font-weight:900; font-size:11px; padding:3px 10px; border-radius:9px; letter-spacing:.5px; }
  .mcard .pl{ font-family:Unbounded; font-weight:800; font-size:19px; line-height:1.15; margin-top:8px; text-shadow:0 2px 8px rgba(0,0,0,.6); }
  .mcard .foot{ padding:12px; display:flex; gap:10px; }
  .mcard .foot button{ flex:1; border:none; border-radius:15px; padding:12px; font-weight:800; font-size:14px; cursor:pointer; font-family:Manrope; }
  .share{ background:var(--accent); color:#08120f; }
  .close{ background:rgba(255,255,255,.08); color:var(--ink); border:var(--stroke)!important; }

  .modal{ position:absolute; inset:0; z-index:8; display:none; flex-direction:column; background:rgba(8,9,14,.6); backdrop-filter:blur(16px) saturate(1.2); -webkit-backdrop-filter:blur(16px) saturate(1.2); }
  .modal.show{ display:flex; animation:fade .2s; }
  .mHead{ display:flex; align-items:center; gap:10px; padding:calc(14px + var(--safe-top)) 16px 10px; }
  .mHead h2{ font-family:Unbounded; font-weight:800; font-size:19px; }
  .mHead .x{ margin-left:auto; width:38px; height:38px; border-radius:12px; background:var(--glass); border:var(--stroke); box-shadow:var(--hl); display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; }
  .mBody{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:6px 16px calc(20px + var(--safe-bot)); }
  .cgrid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .cslot{ border-radius:18px; overflow:hidden; background:var(--glass); border:var(--stroke); box-shadow:var(--hl); aspect-ratio:4/5; position:relative; }
  .cslot.got{ cursor:pointer; }
  .cslot img{ width:100%; height:100%; object-fit:cover; }
  .cslot.locked{ display:flex; align-items:center; justify-content:center; }
  .cslot.locked span{ font-size:30px; opacity:.3; }
  .cslot .t{ position:absolute; left:0; right:0; bottom:0; padding:8px; font-weight:800; font-size:11px; background:linear-gradient(to top,rgba(8,9,14,.9),transparent); }
  .cslot .sh{ position:absolute; top:6px; right:6px; background:rgba(8,9,14,.6); border:var(--stroke); border-radius:9px; font-size:12px; padding:2px 6px; }

  #plus{ position:absolute; z-index:7; font-family:Unbounded; font-weight:800; color:#8ff0e0; font-size:20px; pointer-events:none; opacity:0; text-shadow:0 2px 8px rgba(0,0,0,.5); }
  #toast{ position:absolute; z-index:31; left:50%; top:40%; transform:translateX(-50%); background:var(--glass-2); border:var(--stroke); box-shadow:var(--shadow),var(--hl); color:var(--ink); font-weight:800; font-size:13px; padding:10px 16px; border-radius:14px; opacity:0; pointer-events:none; transition:opacity .25s,transform .25s; white-space:nowrap; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }
</style>
</head>
<body>
<div id="backdrop"><img src="assets/bg/dvor_courier.jpg" alt=""></div>
<div id="stage">
  <img id="scene" src="assets/bg/dvor_courier.jpg" alt="">

  <div class="hud">
    <div class="pill">🪙 <span id="coins">0</span></div>
    <div class="sp"></div>
    <div class="pill"><span id="rate">+0</span><span class="lbl">/с</span></div>
    <div class="icobtn" id="soundBtn">🔇</div>
  </div>

  <div class="biz">
    <div class="bizchip on">🛵 Доставка</div>
    <div class="bizchip">📦 <span class="lock">Котопункт 🔒</span></div>
    <div class="bizchip">🎥 <span class="lock">Мяустрим 🔒</span></div>
    <div class="bizchip">🤖 <span class="lock">КотGPT 🔒</span></div>
  </div>

  <div class="bizTitle"><h1>Кот-курьер</h1><p>Перетащи курьера на такого же — повышение</p></div>

  <div id="boardWrap"><div id="boardPanel"><div id="board"></div></div></div>

  <div id="ticker"><span class="ic">🛵</span><div class="win"><span class="run" id="tickRun"></span></div></div>

  <div class="dock">
    <div class="dbtn" id="memBtn">🖼️<small>Мемы</small><span class="badge" id="memBadge" style="display:none">!</span></div>
    <button id="hireBtn">🐱 Нанять кота<small id="hireCost">10 🪙</small></button>
    <div class="dbtn" id="boostBtn">⚡<small>×2</small></div>
  </div>

  <div id="reveal"><div class="mcard" id="mcard"></div></div>

  <div class="modal" id="mem">
    <div class="mHead"><h2>🖼️ Мем-карты · Доставка</h2><div class="x" id="memClose">✕</div></div>
    <div class="mBody"><div class="cgrid" id="cgrid"></div></div>
  </div>

  <div id="plus"></div>
  <div id="toast"></div>
</div>

<script src="vendor/vk-bridge.min.js"></script>
<script>
"use strict";
/* ===== VK bootstrap: без раннего VKWebAppInit мини-апп НЕ стартует в ВК (урок 3) ===== */
var VKB = (window.vkBridge && window.vkBridge.send) ? window.vkBridge : null;
try{ if(VKB){ VKB.send('VKWebAppInit', {}); } }catch(e){}
try{ if(VKB && VKB.subscribe){ VKB.subscribe(function(e){ /* задел под события ВК */ }); } }catch(e){}

/* ===== Мяу-Корпорация · грей-бокс: бизнес «Доставка» (drag-мерж курьеров) ===== */

var RANKS = [ null,
  { n:"Стажёр",        inc:1,   card:"door" },
  { n:"Курьер",        inc:5,   card:"scooter" },
  { n:"Старший курьер",inc:24,  card:"orders47" },
  { n:"Директор",      inc:120, card:"squished" },
  { n:"CEO доставки",  inc:600, card:"sushi" }
];
// мем-карты локации «Доставка» (панчлайн накладываем в UI/шеринге)
var CARDS = {
  door:    "Оставил заказ у двери. Дверь была не та.",
  scooter: "Правила — для тех, кто не опаздывает.",
  orders47:"47 заказов. Один я.",
  squished:"Заказ доехал. Содержимое — вопрос.",
  sushi:   "Это была рыба. Я курьер. Вы всё понимаете."
};
var CARD_LIST=[{k:"door",n:"У не той двери"},{k:"scooter",n:"Мимо знака 5"},{k:"orders47",n:"47 заказов"},{k:"squished",n:"Помятый заказ"},{k:"sushi",n:"Это была рыба"}];
var TICK=["Курьер года: доставил, не открыл, почти не съел.","Дождь — это когда чаевые особенно уместны.","Самокат показывает 5 км/ч. Самокат — оптимист.","5 звёзд, если не спрашивать, где заказ.","«Оставил у двери» — древнее искусство.","Приложение обещает 2 минуты. Приложение врёт красиво."];

var CELLS=16;
var S = { coins:30, grid:new Array(CELLS).fill(0), hires:0, seen:{}, cards:{} };

var boardEl=document.getElementById('board'), coinsEl=document.getElementById('coins'), rateEl=document.getElementById('rate'),
    hireBtn=document.getElementById('hireBtn'), hireCost=document.getElementById('hireCost'),
    reveal=document.getElementById('reveal'), mcard=document.getElementById('mcard'), plus=document.getElementById('plus'), toastEl=document.getElementById('toast');

var SK="myaucorp_dostavka_v2";
function save(){ try{ localStorage.setItem(SK, JSON.stringify(S)); }catch(e){} }
function load(){ try{ var r=localStorage.getItem(SK); if(r){ var o=JSON.parse(r);
  S.coins=o.coins||30; S.grid=(o.grid&&o.grid.length===CELLS)?o.grid:new Array(CELLS).fill(0); S.hires=o.hires||0; S.seen=o.seen||{}; S.cards=o.cards||{}; } }catch(e){} }

function rate(){ var r=0; for(var i=0;i<CELLS;i++){ if(S.grid[i])r+=RANKS[S.grid[i]].inc; } return r; }
function hireCostVal(){ return Math.round(10*Math.pow(1.18,S.hires)); }
function fmt(n){ n=Math.floor(n); if(n<1000)return ""+n; if(n<1e6)return (n/1e3).toFixed(n<1e4?1:0).replace(/\.0$/,'')+"K"; if(n<1e9)return (n/1e6).toFixed(2).replace(/\.?0+$/,'')+"M"; return (n/1e9).toFixed(2).replace(/\.?0+$/,'')+"B"; }
function renderTop(){ coinsEl.textContent=fmt(S.coins); rateEl.textContent="+"+fmt(rate()); hireCost.textContent=fmt(hireCostVal())+" 🪙"; hireBtn.disabled=S.coins<hireCostVal(); updateBadge(); }

setInterval(function(){ if(document.hidden)return; var r=rate(); if(r>0){ S.coins+=r*0.25; renderTop(); } },250);
setInterval(save, 4000);

function buildBoard(){ boardEl.innerHTML="";
  for(var i=0;i<CELLS;i++){ var c=document.createElement('div'); c.className="cell"; c.dataset.i=i;
    if(S.grid[i]){ c.classList.add('filled'); c.innerHTML='<img src="assets/cats/rank'+S.grid[i]+'.jpg"><div class="rk">'+S.grid[i]+'</div>'; }
    boardEl.appendChild(c);
  }
}

/* ---------- DRAG-MERGE с увеличалкой ---------- */
var drag=null;
boardEl.addEventListener('pointerdown', function(e){
  var cell=e.target.closest('.cell'); if(!cell)return; var i=+cell.dataset.i; if(!S.grid[i])return;
  e.preventDefault();
  var r=cell.getBoundingClientRect();
  var g=document.createElement('div'); g.id='ghost'; g.style.width=r.width+'px'; g.style.height=r.height+'px';
  g.innerHTML='<img src="assets/cats/rank'+S.grid[i]+'.jpg"><div class="rk">'+S.grid[i]+'</div>';
  document.body.appendChild(g);
  drag={ from:i, ghost:g, cell:cell };
  cell.classList.add('dragging');
  moveGhost(e.clientX, e.clientY);
  requestAnimationFrame(function(){ if(drag) g.classList.add('lift'); });
  blip('pick'); vibrate(8);
  window.addEventListener('pointermove', onDrag);
  window.addEventListener('pointerup', endDrag);
  window.addEventListener('pointercancel', endDrag);
});
function moveGhost(x,y){ drag.ghost.style.left=x+'px'; drag.ghost.style.top=y+'px'; }
function targetUnder(x,y){ var el=document.elementFromPoint(x,y); var c=(el&&el.closest)?el.closest('.cell'):null;
  if(!c)return -1; var j=+c.dataset.i; if(j===drag.from)return -1;
  if(S.grid[j]===S.grid[drag.from] && S.grid[j]<5)return j; return -1; }
function clearHi(){ for(var i=0;i<boardEl.children.length;i++) boardEl.children[i].classList.remove('mergeable'); }
function onDrag(e){ if(!drag)return; moveGhost(e.clientX,e.clientY); clearHi();
  var t=targetUnder(e.clientX,e.clientY); if(t>=0) boardEl.children[t].classList.add('mergeable'); }
function endDrag(e){ if(!drag)return;
  window.removeEventListener('pointermove',onDrag); window.removeEventListener('pointerup',endDrag); window.removeEventListener('pointercancel',endDrag);
  var t=targetUnder(e.clientX,e.clientY), g=drag.ghost, from=drag.from, cell=drag.cell; clearHi();
  if(t>=0){ g.remove(); cell.classList.remove('dragging'); drag=null; doMerge(from,t); }
  else { var r=cell.getBoundingClientRect(); g.classList.remove('lift'); g.style.left=(r.left+r.width/2)+'px'; g.style.top=(r.top+r.height/2)+'px';
    var gg=g, cc=cell; setTimeout(function(){ gg.remove(); cc.classList.remove('dragging'); },150); drag=null; }
}
function doMerge(a,b){ var nr=S.grid[a]+1; S.grid[a]=0; S.grid[b]=nr;
  buildBoard(); boardEl.children[b].classList.add('pop'); blip('merge'); vibrate([12,30]); renderTop(); save();
  if(!S.seen[nr]){ S.seen[nr]=1; setTimeout(function(){ showCard(nr); }, 300); }
}

/* ---------- найм ---------- */
hireBtn.addEventListener('click', function(){ var cost=hireCostVal(); if(S.coins<cost)return;
  var idx=S.grid.indexOf(0); if(idx<0){ toast("Поле заполнено — объединяй!"); return; }
  S.coins-=cost; S.hires++; S.grid[idx]=1; buildBoard();
  boardEl.children[idx].classList.add('pop'); blip('hire'); vibrate(12); renderTop(); save();
  if(!S.seen[1]){ S.seen[1]=1; setTimeout(function(){ showCard(1); }, 300); }
});

/* ---------- мем-карта реавил ---------- */
function showCard(rank){ var R=RANKS[rank]; openCard(R.card); }
function openCard(key){ var isNew=!S.cards[key]; S.cards[key]=1; var pl=CARDS[key];
  mcard.innerHTML='<div class="ph"><img src="assets/cards/'+key+'.jpg"><div class="cap">'+(isNew?'<span class="new">✦ НОВАЯ МЕМ-КАРТА</span>':'')+
    '<div class="pl">«'+pl+'»</div></div></div>'+
    '<div class="foot"><button class="close" id="mcClose">Забрать</button><button class="share" id="mcShare">🔗 Поделиться</button></div>';
  reveal.classList.add('show'); blip('win'); updateBadge(); save();
  document.getElementById('mcClose').onclick=function(){ reveal.classList.remove('show'); };
  document.getElementById('mcShare').onclick=function(){ shareCard(key, pl); };
}

/* ---------- ШЕРИНГ карточки (canvas → navigator.share / скачивание) ---------- */
function wrapText(cx,text,x,yBottom,maxW,lh){ var words=text.split(' '),line='',lines=[];
  for(var i=0;i<words.length;i++){ var test=line?line+' '+words[i]:words[i];
    if(cx.measureText(test).width>maxW && line){ lines.push(line); line=words[i]; } else line=test; }
  lines.push(line); var startY=yBottom-(lines.length-1)*lh;
  for(var j=0;j<lines.length;j++) cx.fillText(lines[j], x, startY+j*lh);
}
function shareCard(key, pl){
  toast("Собираю карточку…");
  var img=new Image();
  img.onload=function(){
    var W=1080,H=1350, cv=document.createElement('canvas'); cv.width=W; cv.height=H; var cx=cv.getContext('2d');
    var ir=img.width/img.height, cr=W/H, sw,sh,sx,sy;
    if(ir>cr){ sh=img.height; sw=sh*cr; sx=(img.width-sw)/2; sy=0; } else { sw=img.width; sh=sw/cr; sx=0; sy=(img.height-sh)/2; }
    cx.drawImage(img,sx,sy,sw,sh,0,0,W,H);
    var gr=cx.createLinearGradient(0,H*0.45,0,H); gr.addColorStop(0,'rgba(8,9,14,0)'); gr.addColorStop(1,'rgba(8,9,14,.94)'); cx.fillStyle=gr; cx.fillRect(0,H*0.4,W,H*0.6);
    cx.textBaseline='alphabetic'; cx.fillStyle='#ffffff'; cx.font='800 60px Unbounded, Manrope, sans-serif';
    wrapText(cx,'«'+pl+'»',64,H-150,W-128,72);
    cx.fillStyle='rgba(255,255,255,.78)'; cx.font='700 36px Manrope, sans-serif'; cx.fillText('🐱 Мяу-Корпорация', 64, H-58);
    cv.toBlob(function(blob){ if(!blob){ toast("Не удалось собрать"); return; }
      try{ var file=new File([blob],'myau-meme.png',{type:'image/png'});
        if(navigator.canShare && navigator.canShare({files:[file]})){ navigator.share({files:[file], text:'Мяу-Корпорация 🐱'}).then(function(){},function(){}); return; }
      }catch(e){}
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='myau-meme.png'; document.body.appendChild(a); a.click(); a.remove(); toast("Карточка сохранена");
    },'image/png');
  };
  img.onerror=function(){ toast("Картинка не загрузилась"); };
  img.src='assets/cards/'+key+'.jpg';
}

/* ---------- коллекция ---------- */
document.getElementById('memBtn').onclick=function(){ buildMem(); document.getElementById('mem').classList.add('show'); };
document.getElementById('memClose').onclick=function(){ document.getElementById('mem').classList.remove('show'); };
function buildMem(){ var g=document.getElementById('cgrid'); g.innerHTML="";
  CARD_LIST.forEach(function(c){ var got=S.cards[c.k]; var el=document.createElement('div'); el.className="cslot"+(got?" got":" locked");
    el.innerHTML=got?('<img src="assets/cards/'+c.k+'.jpg"><div class="sh">🔗</div><div class="t">'+c.n+'</div>'):'<span>🖼️</span>';
    if(got) el.onclick=function(){ document.getElementById('mem').classList.remove('show'); openCard(c.k); };
    g.appendChild(el); });
}
function updateBadge(){ var got=0; CARD_LIST.forEach(function(c){ if(S.cards[c.k])got++; });
  var b=document.getElementById('memBadge'); b.style.display=got>0?"block":"none"; b.textContent=got; }

document.getElementById('boostBtn').onclick=function(){ toast("×2 доход за рекламу — в боевой версии"); };

/* ---------- звук (кото-мяу слияние) ---------- */
var soundOn=false, actx=null;
document.getElementById('soundBtn').onclick=function(){ soundOn=!soundOn; this.textContent=soundOn?"🔊":"🔇";
  if(soundOn&&!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } };
function blip(k){ if(!soundOn||!actx)return; var t=actx.currentTime;
  if(k==="merge"){ // синт-«мяу»: глайд вверх→вниз (боевое — ElevenLabs, свой на локацию)
    var o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=1100; f.Q.value=4;
    o.connect(f); f.connect(g); g.connect(actx.destination); o.type="sawtooth";
    o.frequency.setValueAtTime(480,t); o.frequency.exponentialRampToValueAtTime(920,t+.09); o.frequency.exponentialRampToValueAtTime(620,t+.26);
    g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.2,t+.03); g.gain.exponentialRampToValueAtTime(.0001,t+.3);
    o.start(t); o.stop(t+.32); return; }
  var o2=actx.createOscillator(),g2=actx.createGain(); o2.connect(g2); g2.connect(actx.destination);
  var f2=(k==="hire")?420:(k==="pick")?320:(k==="win")?720:520; o2.type=(k==="win")?"sine":"triangle";
  o2.frequency.setValueAtTime(f2,t); g2.gain.setValueAtTime(.0001,t); g2.gain.exponentialRampToValueAtTime(.13,t+.02); g2.gain.exponentialRampToValueAtTime(.0001,t+.22);
  if(k==="win"){ o2.frequency.setValueAtTime(720,t); o2.frequency.setValueAtTime(980,t+.1);} o2.start(t); o2.stop(t+.26);
}
function vibrate(p){ if(navigator.vibrate)try{ navigator.vibrate(p);}catch(e){} }

var tT=null; function toast(m){ toastEl.textContent=m; toastEl.classList.add('show'); clearTimeout(tT); tT=setTimeout(function(){ toastEl.classList.remove('show'); },1700); }

document.addEventListener('visibilitychange', function(){ if(document.hidden) save(); });
addEventListener('pagehide', save);

/* ---------- старт ---------- */
document.getElementById('tickRun').textContent = TICK.join("        🐾        ");
load(); buildBoard(); renderTop();
</script>
