<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Кот на рыбалке — Двор</title>
<style>
  :root{ --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#bfe3d8;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    color:#4a3a2a; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
  #stage{ position:fixed; inset:0; overflow:hidden; }
  video.bg{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  #outV{ opacity:0; z-index:2; transition:opacity .12s; }
  #outV.show{ opacity:1; }

  .hud{ position:absolute; left:0; right:0; z-index:5; display:flex; gap:8px;
    padding:calc(10px + var(--safe-top)) 12px 0; align-items:flex-start; }
  .pill{ background:rgba(255,255,255,.85); border:2px solid #fff; border-radius:16px; padding:7px 12px;
    font-weight:800; box-shadow:0 3px 10px rgba(90,70,40,.18); display:flex; align-items:center; gap:6px; font-size:15px; }
  .pill small{ font-weight:700; opacity:.6; font-size:11px; }
  #coinPill{ font-size:17px; }
  .hud .right{ margin-left:auto; display:flex; gap:8px; }
  .rbtn{ width:44px; height:44px; border-radius:14px; background:rgba(255,255,255,.85); border:2px solid #fff;
    display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 3px 10px rgba(90,70,40,.18); cursor:pointer; }
  .loc{ position:absolute; top:calc(58px + var(--safe-top)); left:50%; transform:translateX(-50%);
    z-index:5; background:rgba(74,58,42,.72); color:#fff; font-weight:800; font-size:13px; padding:5px 14px; border-radius:14px; }

  /* птичка */
  #bird{ position:absolute; top:calc(92px + var(--safe-top)); right:14px; z-index:5; display:flex; align-items:center; gap:8px;
    pointer-events:none; transform:translateX(160px); opacity:0; transition:transform .75s cubic-bezier(.25,1.2,.5,1), opacity .5s; }
  #bird.in{ transform:translateX(0); opacity:1; }
  #birdBubble{ max-width:190px; background:rgba(255,255,255,.95); color:#5a4632; border-radius:14px; padding:8px 12px;
    font-size:12.5px; font-weight:700; line-height:1.25; box-shadow:0 4px 12px rgba(90,70,40,.22); position:relative;
    opacity:0; transform:scale(.85) translateX(10px); transition:opacity .25s .3s, transform .25s .3s; }
  #bird.in #birdBubble{ opacity:1; transform:scale(1) translateX(0); }
  #birdBubble:after{ content:''; position:absolute; right:-6px; top:50%; margin-top:-6px; border:6px solid transparent; border-left-color:rgba(255,255,255,.95); }
  .birdSvg{ width:54px; height:46px; filter:drop-shadow(0 3px 5px rgba(90,70,40,.25)); animation:birdBob 1.3s ease-in-out infinite; }
  @keyframes birdBob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-3px);} }
  .wing{ transform-origin:34px 24px; animation:flap .28s ease-in-out infinite alternate; }
  @keyframes flap{ from{ transform:rotate(2deg);} to{ transform:rotate(-26deg);} }

  /* нижняя панель */
  #dock{ position:absolute; left:0; right:0; bottom:calc(14px + var(--safe-bot)); z-index:6;
    display:flex; align-items:flex-end; gap:10px; padding:0 14px; }
  #actionBtn{ flex:1; border:none; border-radius:20px; padding:16px; font-size:18px; font-weight:900; color:#fff;
    background:linear-gradient(#6bbf7a,#4a9e5c); box-shadow:0 6px 0 #3a8049,0 10px 18px rgba(40,90,50,.35);
    transition:transform .06s, box-shadow .06s; cursor:pointer; }
  #actionBtn:active{ transform:translateY(4px); box-shadow:0 2px 0 #3a8049,0 4px 10px rgba(40,90,50,.35); }
  #actionBtn:disabled{ filter:grayscale(.4) brightness(.92); }
  .dockBtn{ width:60px; height:60px; border-radius:18px; background:rgba(255,255,255,.9); border:2px solid #fff;
    box-shadow:0 4px 12px rgba(90,70,40,.2); display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:22px; cursor:pointer; position:relative; }
  .dockBtn small{ font-size:9px; font-weight:800; opacity:.65; margin-top:1px; }
  .badge{ position:absolute; top:-5px; right:-5px; background:#ff5a3c; color:#fff; font-size:10px; font-weight:900;
    border-radius:9px; padding:1px 5px; }

  /* карточка улова */
  #reveal{ position:absolute; inset:0; z-index:8; display:none; align-items:center; justify-content:center; background:rgba(30,40,36,.4); }
  #reveal.show{ display:flex; animation:fade .2s; }
  @keyframes fade{ from{opacity:0;} to{opacity:1;} }
  .card{ width:78%; max-width:300px; background:#fff8ec; border-radius:24px; padding:18px; text-align:center;
    box-shadow:0 18px 40px rgba(0,0,0,.35); border:3px solid #fff; transform:translateY(8px) scale(.96);
    animation:pop .3s cubic-bezier(.2,1.3,.4,1) forwards; }
  @keyframes pop{ to{ transform:translateY(0) scale(1);} }
  .rar{ font-weight:900; font-size:12px; letter-spacing:1px; text-transform:uppercase; }
  .fishImg{ width:170px; height:170px; margin:6px auto 4px; border-radius:50%; display:block;
    background:radial-gradient(circle,#eafaf3,#cdeee0); box-shadow:0 0 0 4px #fff,0 0 26px 6px var(--gc,#8fd); }
  .fName{ font-weight:900; font-size:21px; margin:2px 0; }
  .fSub{ font-size:13px; opacity:.7; font-style:italic; min-height:34px; }
  .fCoins{ font-weight:900; font-size:22px; color:#e0912a; margin-top:6px; }
  .newTag{ display:inline-block; background:#ff6b6b; color:#fff; font-weight:900; font-size:12px; padding:3px 10px; border-radius:10px; margin-top:6px; }

  /* модалки */
  .modal{ position:absolute; inset:0; z-index:9; display:none; flex-direction:column; background:linear-gradient(#eaf6f0,#d5ece2); }
  .modal.show{ display:flex; }
  .mHead{ display:flex; align-items:center; gap:10px; padding:calc(12px + var(--safe-top)) 14px 10px; }
  .mHead h2{ margin:0; font-size:19px; }
  .mHead .x{ margin-left:auto; font-size:20px; background:#fff; border-radius:12px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 8px rgba(0,0,0,.12); cursor:pointer; }
  .mBody{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:6px 14px calc(20px + var(--safe-bot)); }
  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .slot{ background:#fff; border-radius:16px; padding:8px 6px; text-align:center; box-shadow:0 3px 8px rgba(0,0,0,.08); }
  .slot img{ width:74px; height:74px; border-radius:50%; }
  .slot.locked img{ filter:grayscale(1) brightness(.7) opacity(.35); }
  .slot .n{ font-size:11px; font-weight:800; margin-top:3px; min-height:26px; line-height:1.1; }
  .slot.locked .n{ color:#9aa; }
  .rdot{ width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:3px; vertical-align:middle; }

  /* экипаж */
  .crewRow{ display:flex; align-items:center; gap:12px; background:#fff; border-radius:16px; padding:10px 12px; margin-bottom:10px; box-shadow:0 3px 8px rgba(0,0,0,.08); }
  .crewIco{ width:48px; height:48px; border-radius:14px; background:linear-gradient(#f3f8ff,#dcecff); display:flex; align-items:center; justify-content:center; font-size:26px; flex:0 0 auto; }
  .crewMid{ flex:1; min-width:0; }
  .crewName{ font-weight:900; font-size:15px; }
  .crewInfo{ font-size:11.5px; opacity:.7; }
  .crewBuy{ border:none; border-radius:13px; padding:10px 12px; font-weight:900; font-size:13px; color:#fff;
    background:linear-gradient(#ffcf5c,#f2a231); box-shadow:0 3px 0 #d98a1e; cursor:pointer; min-width:96px; text-align:center; }
  .crewBuy:disabled{ filter:grayscale(.6) brightness(.95); box-shadow:0 3px 0 #9a9a9a; }
  .crewBuy small{ display:block; font-size:10px; font-weight:700; opacity:.85; }
  .rateBar{ background:#fff; border-radius:16px; padding:12px; text-align:center; margin-bottom:12px; box-shadow:0 3px 8px rgba(0,0,0,.08); }
  .rateBar b{ font-size:22px; color:#2b8b98; }

  /* офлайн-поп */
  #offline{ position:absolute; inset:0; z-index:10; display:none; align-items:center; justify-content:center; background:rgba(30,40,36,.5); }
  #offline.show{ display:flex; }
  .offCard{ width:80%; max-width:320px; background:#fff8ec; border-radius:22px; padding:22px 20px; text-align:center; box-shadow:0 18px 40px rgba(0,0,0,.4); border:3px solid #fff; }
  .offCard h3{ margin:.2em 0; font-size:19px; }
  .offCard .amt{ font-size:30px; font-weight:900; color:#e0912a; margin:6px 0; }
  .offBtns{ display:flex; gap:10px; margin-top:14px; }
  .offBtns button{ flex:1; border:none; border-radius:15px; padding:13px; font-weight:900; font-size:14px; cursor:pointer; }
  .btnMain{ background:linear-gradient(#6bbf7a,#4a9e5c); color:#fff; box-shadow:0 4px 0 #3a8049; }
  .btnAd{ background:linear-gradient(#ffcf5c,#f2a231); color:#5a3a10; box-shadow:0 4px 0 #d98a1e; }

  #toast{ position:absolute; left:50%; top:40%; transform:translate(-50%,0); z-index:11; background:rgba(74,58,42,.92);
    color:#fff; font-weight:800; font-size:14px; padding:9px 16px; border-radius:14px; opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s; white-space:nowrap; }
  #toast.show{ opacity:1; transform:translate(-50%,-8px); }
  #plusFloat{ position:absolute; z-index:7; font-weight:900; color:#ffd24a; font-size:22px; text-shadow:0 2px 4px rgba(0,0,0,.4); pointer-events:none; opacity:0; }
</style>
</head>
<body>
<div id="stage">
  <video id="idleV" class="bg" src="assets/video/idle.mp4" poster="assets/video/poster.jpg" muted playsinline autoplay loop preload="auto"></video>
  <video id="outV" class="bg" muted playsinline preload="auto"></video>

  <div class="hud">
    <div class="pill" id="coinPill">🪙 <span id="coins">0</span></div>
    <div class="right">
      <div class="pill"><span id="rate">+0</span><small>/с</small></div>
      <div class="rbtn" id="soundBtn">🔇</div>
    </div>
  </div>
  <div class="loc">🪣 Двор · <span id="dexCount">0</span>/8</div>

  <div id="bird">
    <div id="birdBubble"></div>
    <svg class="birdSvg" viewBox="0 0 70 60" aria-hidden="true">
      <path d="M50 30 L69 21 L64 33 L69 41 Z" fill="#6fb0d6"/>
      <ellipse cx="34" cy="32" rx="20" ry="17" fill="#8fc7e8"/>
      <ellipse cx="27" cy="38" rx="12" ry="10" fill="#fdf3e0"/>
      <path d="M16 30 L4 33 L16 37 Z" fill="#f5a623"/>
      <circle cx="21" cy="27" r="3" fill="#3a2a1a"/><circle cx="22" cy="26" r="1" fill="#fff"/>
      <circle cx="19" cy="33" r="3" fill="#ffb3ba" opacity=".55"/>
      <path class="wing" d="M34 21 Q49 19 46 34 Q38 32 31 29 Z" fill="#6fb0d6"/>
      <path d="M30 48 l0 5 M30 53 l-3 2 M30 53 l3 2" stroke="#f5a623" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <path d="M39 48 l0 5 M39 53 l-3 2 M39 53 l3 2" stroke="#f5a623" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <div id="dock">
    <div class="dockBtn" id="crewBtn">⚓<small>Экипаж</small><span class="badge" id="crewBadge" style="display:none">!</span></div>
    <button id="actionBtn">🎣 Закинуть удочку</button>
    <div class="dockBtn" id="dexBtn">📖<small>Декс</small></div>
  </div>

  <div id="reveal"><div class="card" id="card"></div></div>

  <div class="modal" id="dex">
    <div class="mHead"><h2>Рыба-декс · Двор</h2><div class="x" data-close="dex">✕</div></div>
    <div class="mBody"><div class="grid" id="dexGrid"></div></div>
  </div>

  <div class="modal" id="crew">
    <div class="mHead"><h2>⚓ Котоэкипаж</h2><div class="x" data-close="crew">✕</div></div>
    <div class="mBody">
      <div class="rateBar">Ловят, пока тебя нет: <b id="rateBig">+0</b> 🪙/с</div>
      <div id="crewList"></div>
      <p style="font-size:12px;opacity:.6;text-align:center">Экипаж копит монеты в офлайне (кап 4 ч, ×0.5). Нанимай и качай — доход растёт.</p>
    </div>
  </div>

  <div id="offline"><div class="offCard">
    <h3>🐟 Экипаж не дремал!</h3>
    <div>Пока тебя не было, наловили на</div>
    <div class="amt" id="offAmt">0 🪙</div>
    <div class="offBtns">
      <button class="btnMain" id="offClaim">Забрать</button>
      <button class="btnAd" id="offX2">×2 (реклама)</button>
    </div>
  </div></div>

  <div id="toast"></div>
  <div id="plusFloat"></div>
</div>

<script>
"use strict";
/* ===== Кот на рыбалке — локация «Двор». Запечённые лупы + idle-слой. ===== */

// ---- рыбы ----
var FISH = [
  { id:"tadpole",  name:"Головастик",      rar:"common", val:4,  w:20, sub:"Будущая лягушка. Пока — улов." },
  { id:"minnow",   name:"Малёк",           rar:"common", val:5,  w:20, sub:"Меньше твоих амбиций." },
  { id:"frog",     name:"Лягушка-квакушка",rar:"common", val:7,  w:18, sub:"Квакает громче, чем клюёт." },
  { id:"crucian",  name:"Карась",          rar:"common", val:11, w:18, sub:"Клюёт на всё, кроме твоих проблем." },
  { id:"boot",     name:"Сапог 45-го",     rar:"junk",   val:1,  w:6,  sub:"Улов дня. К сожалению." },
  { id:"koi",      name:"Карп-толстяк",    rar:"rare",   val:52, w:8,  sub:"Ел лучше тебя всю зиму." },
  { id:"catfish",  name:"Сом в очках",     rar:"rare",   val:70, w:6,  sub:"Видел дно. Не впечатлён." },
  { id:"goldfish", name:"Золотая рыбка",   rar:"legend", val:340, w:1.6, sub:"Три желания? Только лайк и репост." }
];
var RAR = { common:{name:"Обычная",col:"#57b8c4",txt:"#2b8b98"}, rare:{name:"Редкая",col:"#7a86ff",txt:"#5560e0"},
  legend:{name:"Легендарная",col:"#ffb020",txt:"#d98a10"}, junk:{name:"Хлам",col:"#b7b0a4",txt:"#8b8578"} };
var TICKS = ["Тишина. Только ты и поплавок…","Карп ел лучше тебя всю зиму.","Сапог 45-го — улов дня. К сожалению.",
  "Золотая рыбка обещает лайк и репост.","Клюёт на всё, кроме твоих проблем."];

// ---- экипаж (idle) ----
var CREW = [
  { id:"yunga",  name:"Юнга",   ico:"🐱",  base:1,   cost0:50 },
  { id:"matros", name:"Матрос", ico:"🐈",  base:6,   cost0:350 },
  { id:"bocman", name:"Боцман", ico:"😼",  base:26,  cost0:2200 },
  { id:"starpom",name:"Старпом",ico:"🐈‍⬛", base:110, cost0:12000 },
  { id:"kapitan",name:"Капитан",ico:"🦁",  base:420, cost0:60000 }
];

// ---- тайминги клипов ----
var CATCH_BEAT=4600, CATCH_END=6000, MISS_BEAT=5600, MISS_END=6900;
var CATCH_CHANCE=0.66; // база; растёт с апгрейдами (тут фикс для прототипа)

// ---- состояние ----
var S = { coins:0, dex:{}, crew:{}, seen:0 };
CREW.forEach(function(c){ S.crew[c.id]={count:0, cost:c.cost0}; });
var state="idle";

// ---- элементы ----
var idleV=document.getElementById('idleV'), outV=document.getElementById('outV');
var actionBtn=document.getElementById('actionBtn');
var coinsEl=document.getElementById('coins'), rateEl=document.getElementById('rate'), rateBig=document.getElementById('rateBig'), dexCountEl=document.getElementById('dexCount');
var reveal=document.getElementById('reveal'), card=document.getElementById('card');
var toastEl=document.getElementById('toast'), plusFloat=document.getElementById('plusFloat');

// ---- сохранение ----
var SKEY="kotfish_dvor_v1";
function save(){ S.seen=Date.now(); try{ localStorage.setItem(SKEY, JSON.stringify(S)); }catch(e){} }
function load(){ try{ var r=localStorage.getItem(SKEY); if(r){ var o=JSON.parse(r);
  S.coins=o.coins||0; S.dex=o.dex||{}; S.seen=o.seen||0;
  if(o.crew) CREW.forEach(function(c){ if(o.crew[c.id]){ S.crew[c.id].count=o.crew[c.id].count|0; S.crew[c.id].cost=o.crew[c.id].cost||c.cost0; } });
} }catch(e){} }

// ---- экономика idle ----
function rate(){ var r=0; CREW.forEach(function(c){ r+=S.crew[c.id].count*c.base; }); return r; }
function renderCoins(){ coinsEl.textContent=fmt(Math.floor(S.coins)); }
function renderRate(){ var r=rate(); rateEl.textContent="+"+fmt(r); rateBig.textContent="+"+fmt(r); }
function fmt(n){ n=Math.floor(n); if(n<1000)return ""+n; if(n<1e6)return (n/1000).toFixed(n<1e4?1:0).replace(/\.0$/,'')+"K"; return (n/1e6).toFixed(2).replace(/\.00$/,'')+"M"; }
function addCoins(n,fly){ S.coins+=n; renderCoins();
  if(fly){ plusFloat.textContent="+"+fmt(n); plusFloat.style.left="50%"; plusFloat.style.top="46%"; plusFloat.style.transition="none"; plusFloat.style.opacity="1"; plusFloat.style.transform="translate(-50%,0)";
    requestAnimationFrame(function(){ plusFloat.style.transition="all 1s ease-out"; plusFloat.style.opacity="0"; plusFloat.style.transform="translate(-50%,-80px)"; }); } }

// живой доход
setInterval(function(){ if(document.hidden)return; var r=rate(); if(r>0){ S.coins+=r*0.25; renderCoins(); if(crewOpen) refreshCrewAfford(); } },250);
setInterval(save, 5000);

// ---- заброс ----
function cast(){
  if(state!=="idle")return;
  state="casting"; actionBtn.disabled=true; actionBtn.textContent="…";
  var isCatch = Math.random()<CATCH_CHANCE;
  var fish = isCatch ? pickFish() : null;
  outV.src = isCatch ? "assets/video/catch.mp4" : "assets/video/miss.mp4";
  outV.classList.add('show'); try{ outV.currentTime=0; var p=outV.play(); if(p&&p.catch)p.catch(function(){}); }catch(e){}
  blip("cast");
  if(isCatch){
    setTimeout(function(){ showReveal(fish); blip("win"); }, CATCH_BEAT);
    setTimeout(function(){ endCast(); }, CATCH_END);
  } else {
    setTimeout(function(){ toast("Сорвалась! Ушла и смеётся 🐟"); blip("bite"); }, MISS_BEAT);
    setTimeout(function(){ endCast(); }, MISS_END);
  }
}
function endCast(){ outV.classList.remove('show'); try{ outV.pause(); }catch(e){}
  state="idle"; actionBtn.disabled=false; actionBtn.textContent="🎣 Закинуть удочку";
  try{ idleV.play(); }catch(e){} save();
}
function showReveal(fish){
  var isNew=!S.dex[fish.id]; var gain=Math.round(fish.val*(isNew?5:1));
  var r=RAR[fish.rar];
  card.innerHTML='<div class="rar" style="color:'+r.txt+'">'+r.name+'</div>'+
    '<img class="fishImg" src="assets/fish/'+fish.id+'.png" style="--gc:'+r.col+'">'+
    '<div class="fName">'+fish.name+'</div><div class="fSub">«'+fish.sub+'»</div>'+
    (isNew?'<div class="newTag">✦ НОВАЯ РЫБА · +бонус</div>':'')+
    '<div class="fCoins">+'+fmt(gain)+' 🪙</div>';
  reveal.classList.add('show');
  if(isNew){ S.dex[fish.id]=1; updateDexCount(); }
  addCoins(gain,false);
  setTimeout(function(){ reveal.classList.remove('show'); }, isNew?1900:1250);
}
function pickFish(){ var t=0,i; for(i=0;i<FISH.length;i++)t+=FISH[i].w; var r=Math.random()*t;
  for(i=0;i<FISH.length;i++){ r-=FISH[i].w; if(r<=0)return FISH[i]; } return FISH[0]; }
function updateDexCount(){ var c=0; for(var k in S.dex) if(S.dex[k])c++; dexCountEl.textContent=c; }

actionBtn.addEventListener('click', cast);

// ---- экипаж UI ----
var crewOpen=false, crewList=document.getElementById('crewList');
function buildCrew(){ crewList.innerHTML="";
  CREW.forEach(function(c){ var st=S.crew[c.id];
    var row=document.createElement('div'); row.className="crewRow";
    row.innerHTML='<div class="crewIco">'+c.ico+'</div>'+
      '<div class="crewMid"><div class="crewName">'+c.name+' <span style="opacity:.6;font-size:12px">×'+st.count+'</span></div>'+
      '<div class="crewInfo">+'+fmt(c.base)+' 🪙/с каждый · всего +'+fmt(c.base*st.count)+'/с</div></div>'+
      '<button class="crewBuy" data-c="'+c.id+'">Нанять<small>'+fmt(st.cost)+' 🪙</small></button>';
    crewList.appendChild(row);
  });
  refreshCrewAfford();
}
function refreshCrewAfford(){ var btns=crewList.querySelectorAll('.crewBuy');
  btns.forEach(function(b){ var id=b.getAttribute('data-c'); b.disabled = S.coins < S.crew[id].cost; }); }
crewList.addEventListener('click', function(e){ var b=e.target.closest('.crewBuy'); if(!b)return;
  var id=b.getAttribute('data-c'), st=S.crew[id];
  if(S.coins>=st.cost){ S.coins-=st.cost; st.count++; st.cost=Math.round(st.cost*1.15);
    renderCoins(); renderRate(); buildCrew(); updateCrewBadge(); save(); blip("tick"); }
});
function updateCrewBadge(){ var canBuy=false; CREW.forEach(function(c){ if(S.coins>=S.crew[c.id].cost) canBuy=true; });
  document.getElementById('crewBadge').style.display = (canBuy && rate()===0)?"block":"none"; }

// ---- модалки ----
document.getElementById('crewBtn').onclick=function(){ buildCrew(); crewOpen=true; document.getElementById('crew').classList.add('show'); };
document.getElementById('dexBtn').onclick=function(){ buildDex(); document.getElementById('dex').classList.add('show'); };
document.querySelectorAll('[data-close]').forEach(function(x){ x.onclick=function(){ var m=x.getAttribute('data-close'); document.getElementById(m).classList.remove('show'); if(m==="crew")crewOpen=false; }; });

var dexGrid=document.getElementById('dexGrid');
function buildDex(){ dexGrid.innerHTML="";
  FISH.forEach(function(f){ var got=S.dex[f.id]; var r=RAR[f.rar];
    var el=document.createElement('div'); el.className="slot"+(got?"":" locked");
    el.innerHTML='<img src="assets/fish/'+f.id+'.png">'+'<div class="n">'+(got?'<span class="rdot" style="background:'+r.col+'"></span>'+f.name:'???')+'</div>';
    dexGrid.appendChild(el); });
}

// ---- офлайн-доход ----
function offlineEarn(){ if(!S.seen)return; var r=rate(); if(r<=0)return;
  var dt=(Date.now()-S.seen)/1000; if(dt<30)return;
  var capped=Math.min(dt, 4*3600); var earn=Math.floor(capped*r*0.5); if(earn<=0)return;
  pendingOff=earn;
  document.getElementById('offAmt').textContent=fmt(earn)+" 🪙";
  document.getElementById('offline').classList.add('show');
}
var pendingOff=0;
document.getElementById('offClaim').onclick=function(){ addCoins(pendingOff,false); closeOff(); };
document.getElementById('offX2').onclick=function(){ addCoins(pendingOff*2,false); toast("Реклама: ×2 к улову экипажа!"); closeOff(); };
function closeOff(){ document.getElementById('offline').classList.remove('show'); pendingOff=0; save(); }

// ---- звук ----
var soundOn=false, actx=null;
document.getElementById('soundBtn').onclick=function(){ soundOn=!soundOn; this.textContent=soundOn?"🔊":"🔇";
  if(soundOn&&!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } };
function blip(kind){ if(!soundOn||!actx)return; var o=actx.createOscillator(),g=actx.createGain(); o.connect(g); g.connect(actx.destination);
  var t=actx.currentTime,f=440; if(kind==="cast"){f=300;o.type="sine";} else if(kind==="bite"){f=520;o.type="triangle";}
  else if(kind==="tick"){f=560;o.type="square";} else if(kind==="win"){f=660;o.type="sine";}
  o.frequency.setValueAtTime(f,t); g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.16,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+.28);
  if(kind==="win"){ o.frequency.setValueAtTime(660,t); o.frequency.setValueAtTime(880,t+.12); } o.start(t); o.stop(t+.3); }
function chirp(){ if(!soundOn||!actx)return; [1500,2000].forEach(function(f,i){ var o=actx.createOscillator(),g=actx.createGain(); o.connect(g);g.connect(actx.destination);
  var t=actx.currentTime+i*0.11; o.type="sine"; o.frequency.setValueAtTime(f,t); g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.11,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+.13); o.start(t); o.stop(t+.15); }); }

// ---- тост ----
var toastT=null;
function toast(m){ toastEl.textContent=m; toastEl.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){ toastEl.classList.remove('show'); },1600); }

// ---- птичка ----
var bird=document.getElementById('bird'), birdBubble=document.getElementById('birdBubble'), bji=0, birdTO=null;
function birdVisit(){ birdBubble.textContent=TICKS[bji%TICKS.length]; bji++; bird.classList.add('in'); chirp();
  clearTimeout(birdTO); birdTO=setTimeout(function(){ bird.classList.remove('in'); birdTO=setTimeout(birdVisit, 5000+Math.random()*4000); },5200); }

// ---- пауза видео при сворачивании ----
document.addEventListener('visibilitychange', function(){
  if(document.hidden){ try{idleV.pause();}catch(e){} try{outV.pause();}catch(e){} save(); }
  else { try{idleV.play();}catch(e){} if(state==="casting")try{outV.play();}catch(e){} } });
addEventListener('pagehide', save);

// ---- старт ----
load(); renderCoins(); renderRate(); updateDexCount(); updateCrewBadge();
offlineEarn();
setTimeout(birdVisit, 1600);
</script>
</body>
</html>
